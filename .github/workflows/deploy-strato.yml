name: Build & Deploy to Strato (tbai.com.de/ai-shift-happens/)

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build
        env:
          VITE_BASE_PATH: '/ai-shift-happens/'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Substitute base path and site URL in static files
        run: |
          sed -i "s|__BASE_PATH__|/ai-shift-happens/|g" dist/.htaccess
          sed -i "s|__BASE_PATH__|/ai-shift-happens/|g" dist/manifest.json
          sed -i "s|__BASE_PATH__|/ai-shift-happens/|g" dist/sw.js
          sed -i "s|__SITE_URL__|https://tbai.com.de/ai-shift-happens|g" dist/index.html
          sed -i "s|__SITE_URL__|https://tbai.com.de/ai-shift-happens|g" dist/sitemap.xml
          sed -i "s|__SITE_URL__|https://tbai.com.de/ai-shift-happens|g" dist/robots.txt

      - name: Rename dist for upload
        run: mv dist ai-shift-happens

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './ai-shift-happens/'
          remote_path: './site/'
          sftpArgs: '-o ConnectTimeout=5'
          sftp_only: true
