<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title">AI Shift Happens – Mindset Shift App</title>
  <meta name="description" data-i18n-attr="content" data-i18n="metaDesc" content="AI Shift Happens – die Mindset-Shift App. Demnächst verfügbar." />
  <meta name="theme-color" content="#000000" />
  <meta property="og:title" content="AI Shift Happens" />
  <meta property="og:description" content="Die Mindset-Shift App. Demnächst verfügbar." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ai-shift-happens.com" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #000; color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; }

    .bg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }
    .veil {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0.25) 0%,
        rgba(0,0,0,0.65) 60%,
        rgba(0,0,0,0.85) 100%);
    }

    .stage {
      position: relative; z-index: 2;
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: space-between; padding: clamp(24px, 4vw, 56px);
    }

    header, footer { display: flex; justify-content: space-between; align-items: center;
      font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
      opacity: 0.85; }
    header .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: #10b981; margin-right: 8px; box-shadow: 0 0 12px #10b981;
      animation: pulse 2s infinite; }
    @keyframes pulse { 50% { opacity: 0.4; } }

    .lang-switch { display: inline-flex; border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px; padding: 3px; gap: 2px; }
    .lang-switch button { background: transparent; border: 0; color: #fff;
      font: inherit; font-size: 12px; letter-spacing: 0.1em;
      padding: 5px 12px; border-radius: 999px; cursor: pointer;
      opacity: 0.55; transition: opacity 0.15s ease, background 0.15s ease; }
    .lang-switch button:hover { opacity: 0.9; }
    .lang-switch button[aria-pressed="true"] {
      background: rgba(255,255,255,0.95); color: #000; opacity: 1; }

    main { display: flex; flex-direction: column; justify-content: center;
      flex: 1; max-width: 820px; }
    .kicker { font-size: 14px; letter-spacing: 0.24em; text-transform: uppercase;
      opacity: 0.7; margin-bottom: 18px; }
    h1 { font-size: clamp(44px, 8vw, 104px); line-height: 0.95; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 22px; }
    h1 .gradient { background: linear-gradient(120deg, #ffffff 0%, #a5b4fc 40%, #f0abfc 80%);
      -webkit-background-clip: text; background-clip: text; color: transparent; }
    p.lead { font-size: clamp(17px, 1.6vw, 20px); line-height: 1.55;
      max-width: 620px; opacity: 0.88; font-weight: 300; }

    .cta { margin-top: 38px; display: flex; gap: 14px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 22px; border-radius: 999px; font-size: 15px; font-weight: 600;
      text-decoration: none; transition: transform 0.15s ease, background 0.2s ease; }
    .btn.primary { background: #fff; color: #000; }
    .btn.primary:hover { transform: translateY(-1px); background: #f4f4f5; }

    footer { font-size: 12px; opacity: 0.6; }
    footer a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.25); }

    #secret-entry {
      position: fixed; bottom: 18px; right: 20px; z-index: 10;
      width: 24px; height: 24px; border-radius: 50%;
      background: transparent; border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer; opacity: 0.12;
      transition: opacity 0.3s ease, border-color 0.3s ease;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
    }
    #secret-entry:hover { opacity: 0.45; border-color: rgba(255,255,255,0.4); }
    #secret-entry svg { width: 10px; height: 10px; fill: rgba(255,255,255,0.8); }

    @media (max-width: 768px) {
      html, body { height: auto; overflow-x: hidden; overflow-y: auto; }
      body { display: flex; flex-direction: column; min-height: 100vh; }

      .bg {
        position: static; inset: auto;
        width: 100%; height: auto;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        order: 1;
      }
      .veil { display: none; }

      .stage {
        position: static;
        order: 2; flex: 1;
        min-height: auto;
        justify-content: flex-start;
        padding: 24px 22px 28px;
        gap: 26px;
      }

      header { font-size: 12px; }
      main { flex: 0 1 auto; }
      h1 { font-size: clamp(40px, 11vw, 64px); margin-bottom: 16px; }
      p.lead { font-size: 16px; }
      .kicker { margin-bottom: 12px; }
      .cta { margin-top: 24px; }
      footer .legal-spacer { display: none; }
    }
  </style>
</head>
<body>
  <video class="bg" autoplay muted loop playsinline poster=""></video>
  <div class="veil"></div>

  <div class="stage">
    <header>
      <span><span class="dot"></span><span data-i18n="status">In Entwicklung</span></span>
      <div class="lang-switch" role="group" aria-label="Sprache">
        <button type="button" data-lang="de" aria-pressed="true">DE</button>
        <button type="button" data-lang="en" aria-pressed="false">EN</button>
      </div>
    </header>

    <main>
      <div class="kicker" data-i18n="kicker">Mindset-Shift App</div>
      <h1>AI Shift <span class="gradient">Happens.</span></h1>
      <p class="lead" data-i18n="lead">
        Eine neue Art, mit der KI-Transformation umzugehen — nicht als Bedrohung,
        sondern als Mindset. Die App erscheint in Kürze.
      </p>
      <div class="cta">
        <a class="btn primary" data-i18n="cta" data-i18n-attr="href" data-i18n-href="mailtoHref" href="mailto:contact@tbai.cloud?subject=AI%20Shift%20Happens%20—%20Early%20Access">Early Access anfragen</a>
      </div>
    </main>

    <footer>
      <a href="https://tbai.cloud/imprint" target="_blank" rel="noopener" data-i18n="imprint">Impressum</a>
      <span class="legal-spacer" data-i18n="tag">Platzhalter · Launch folgt</span>
    </footer>
  </div>

  <a id="secret-entry" href="#" title="" aria-hidden="true" tabindex="-1">
    <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
      <circle cx="5" cy="5" r="4.5" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1"/>
      <polygon points="4,3 7,5 4,7" fill="rgba(255,255,255,0.8)"/>
    </svg>
  </a>

  <script>
    const translations = {
      de: {
        title: 'AI Shift Happens – Mindset Shift App',
        metaDesc: 'AI Shift Happens – die Mindset-Shift App. Demnächst verfügbar.',
        status: 'In Entwicklung',
        kicker: 'Mindset-Shift App',
        lead: 'Eine neue Art, mit der KI-Transformation umzugehen — nicht als Bedrohung, sondern als Mindset. Die App erscheint in Kürze.',
        cta: 'Early Access anfragen',
        mailtoHref: 'mailto:contact@tbai.cloud?subject=AI%20Shift%20Happens%20%E2%80%94%20Early%20Access',
        imprint: 'Impressum',
        tag: 'Platzhalter · Launch folgt'
      },
      en: {
        title: 'AI Shift Happens – Mindset Shift App',
        metaDesc: 'AI Shift Happens – the Mindset-Shift App. Coming soon.',
        status: 'In Development',
        kicker: 'Mindset-Shift App',
        lead: 'A new way to engage with the AI transformation — not as a threat, but as a mindset. The app is coming soon.',
        cta: 'Request Early Access',
        mailtoHref: 'mailto:contact@tbai.cloud?subject=AI%20Shift%20Happens%20%E2%80%94%20Early%20Access',
        imprint: 'Legal Notice',
        tag: 'Placeholder · Launch soon'
      }
    };

    function applyLang(lang) {
      const t = translations[lang] || translations.de;
      document.documentElement.lang = lang;
      document.title = t.title;

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (!(key in t)) return;
        const attr = el.getAttribute('data-i18n-attr');
        if (attr === 'content') {
          el.setAttribute('content', t[key]);
        } else if (attr === 'href') {
          const hrefKey = el.getAttribute('data-i18n-href');
          if (hrefKey && hrefKey in t) el.setAttribute('href', t[hrefKey]);
          el.textContent = t[key];
        } else {
          el.textContent = t[key];
        }
      });

      document.querySelectorAll('.lang-switch button').forEach(btn => {
        btn.setAttribute('aria-pressed', btn.dataset.lang === lang ? 'true' : 'false');
      });

      try { localStorage.setItem('lang', lang); } catch (e) {}
    }

    (function initSecretEntry() {
      const btn = document.getElementById('secret-entry');
      if (!btn) return;
      const SUPABASE_URL = 'https://amhfxaqolholacanqyas.supabase.co';
      const REDIRECT_TO = 'https://ai-shift-happens.com/app';
      const oauthUrl =
        SUPABASE_URL + '/auth/v1/authorize?provider=google' +
        '&redirect_to=' + encodeURIComponent(REDIRECT_TO);
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = oauthUrl;
      });
    })();

    (function init() {
      let saved = null;
      try { saved = localStorage.getItem('lang'); } catch (e) {}
      const browser = (navigator.language || 'de').slice(0, 2).toLowerCase();
      const lang = saved || (browser === 'en' ? 'en' : 'de');
      applyLang(lang);

      document.querySelectorAll('.lang-switch button').forEach(btn => {
        btn.addEventListener('click', () => applyLang(btn.dataset.lang));
      });

      const video = document.querySelector('video.bg');
      const isMobile = window.matchMedia('(max-width: 768px)').matches
        || /Mobi|Android|iPhone/i.test(navigator.userAgent);
      video.src = isMobile ? 'assets/hero-mobile.mp4' : 'assets/hero.mp4';
      video.load();
    })();
  </script>
</body>
</html>
